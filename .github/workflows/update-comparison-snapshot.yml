name: Update Comparison Snapshot

on:
  workflow_dispatch:
  schedule:
    - cron: "30 2 * * 1"

permissions:
  contents: write

jobs:
  update-snapshot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate weekly comparison snapshot
        run: python scripts/update_comparison_snapshot.py

      - name: Commit and push if changed
        run: |
          if [[ -n "$(git status --porcelain 大厂龙虾对比 README.md)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add 大厂龙虾对比/README.md 大厂龙虾对比/数据快照-*.md
            git commit -m "chore: auto-update weekly claw comparison snapshot"
            git push
          else
            echo "No comparison snapshot changes"
          fi
